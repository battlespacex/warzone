<div class="modal contact-modal" id="contact-modal" aria-hidden="true">
    <div class="modal__overlay" data-modal-close>
        <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="contact-modal-title" aria-describedby="contact-modal-message" tabindex="-1">
            <button type="button" class="modal__close x-icon" data-modal-close aria-label="Close">
                <span aria-hidden="true" class="aerocism-ico-close-1"></span>
            </button>

            <div class="x-icon">
                <span aria-hidden="true" class="aerocism-ico-plane-1"></span>
            </div>
            <h3 id="contact-modal-title">Request Sent</h3>
            <p id="contact-modal-message">Thanks for reaching out. Your request is in and I’ll reply as soon as possible.</p>
        </div>
    </div>
</div>
