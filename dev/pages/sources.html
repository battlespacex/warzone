<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewportfit=cover" />
    <title><%= meta.title %></title>
    <meta name="description" content="<%= meta.description %>" />
    <link rel="canonical" href="<%= meta.canonical %>" />
    <meta name="robots" content="<%= meta.robots %>" />
    <%= partials("head-base") %>
    <%= partials("head-verifications") %>
</head>
<body class="other-pages">
    <div class="body-bg" aria-hidden="true"></div>
    <%= partials("header") %>
    <main id="main" class="warzone-shell">
        <section class="hero-banner">
            <div class="hero-banner__box">
                <div class="hero-banner__eyebrow">Sources</div>
                <h1 class="hero-banner__title">Source Transparency</h1>
                <p class="hero-banner__desc">
                    This page is ready for methodology notes, disclosure text, feed
                    references, and source categories.
                </p>
            </div>
        </section>
    </main>
    <%= partials("footer") %>
</body>
</html>
