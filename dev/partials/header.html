<!-- Command bar -->
<header class="warzone-commandbar">
    <div class="warzone-brand">
        <h1><span>STRIKE</span>MAP</h1>
        <div class="warzone-brand-actions">
            <a class="icon-chip" href="https://t.me/strikemaplive" target="_blank" rel="noopener noreferrer" aria-label="Telegram">TG</a>
            <a class="icon-chip" href="https://x.com/strikemaplive" target="_blank" rel="noopener noreferrer" aria-label="X / Twitter">X</a>
            <a class="icon-chip" href="#" aria-label="Instagram">IG</a>
            <a class="icon-chip" href="#" aria-label="Discord">DC</a>
            <button class="support-chip">♥ Support</button>
        </div>
    </div>

    <!-- Region dropdown — populated by warzone-region-selector.js -->
    <div class="warzone-region-bar">
        <span class="warzone-region-bar__label">REGION</span>
        <select id="wz-region-nav" aria-label="Select monitoring region"></select>
    </div>

    <div class="warzone-top-tabs">
        <button class="top-tab is-active" data-view="strikes">Strikes</button>
        <button class="top-tab" data-view="analytics">Analytics</button>
        <button class="top-tab" data-view="recon">Recon</button>
        <button class="top-tab" data-view="military">Military</button>
    </div>
</header>
